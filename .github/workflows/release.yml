name: Release

# Publish a workspace package to npm. Trigger either by pushing a tag like
# `core-v0.1.1` / `ui-v0.2.0`, or manually via "Run workflow" (workflow_dispatch)
# giving the package + version. The version must match that package's
# package.json version.

on:
  push:
    tags:
      - 'core-v*'
      - 'ui-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'package to publish (core or ui)'
        required: true
        type: choice
        options: [core, ui]
      version:
        description: 'version, must match package.json'
        required: true

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package + version
        id: pkg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="$GITHUB_REF_NAME"
            echo "name=${tag%-v*}" >> "$GITHUB_OUTPUT"
            echo "version=${tag##*-v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Tag version must match package.json
        run: |
          want='${{ steps.pkg.outputs.version }}'
          have="$(node -p "require('./packages/${{ steps.pkg.outputs.name }}/package.json').version")"
          test "$want" = "$have" || { echo "::error::version $want != package.json $have"; exit 1; }

      - run: pnpm --filter "@alert-whatif/${{ steps.pkg.outputs.name }}" build
      - run: pnpm --filter "@alert-whatif/${{ steps.pkg.outputs.name }}" test

      - name: Publish to npm with provenance
        working-directory: packages/${{ steps.pkg.outputs.name }}
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
