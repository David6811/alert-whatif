services:
  grafana:
    user: root
    container_name: 'weixu-alertwhatif-app'

    build:
      context: .
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.4.0}
        development: ${DEVELOPMENT:-false}
        anonymous_auth_enabled: ${ANONYMOUS_AUTH_ENABLED:-true}
    ports:
      - 3000:3000/tcp
    volumes:
      - grafana-data:/var/lib/grafana
      - ../dist:/var/lib/grafana/plugins/weixu-alertwhatif-app
      - ../provisioning:/etc/grafana/provisioning
      - ..:/root/weixu-alertwhatif-app

    env_file:
      - path: ../.env
        required: false

    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.weixu-alertwhatif-app:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: weixu-alertwhatif-app

volumes:
  grafana-data:
