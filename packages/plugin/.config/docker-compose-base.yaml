services:
  grafana:
    user: root
    container_name: 'pantrypulse-alertwhatif-app'

    build:
      context: .
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.4.0}
        development: ${DEVELOPMENT:-false}
        anonymous_auth_enabled: ${ANONYMOUS_AUTH_ENABLED:-true}
    ports:
      - 3000:3000/tcp
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ../dist:/var/lib/grafana/plugins/pantrypulse-alertwhatif-app
      - ../provisioning:/etc/grafana/provisioning
      - ..:/root/pantrypulse-alertwhatif-app

    env_file:
      - path: ../.env
        required: false

    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.pantrypulse-alertwhatif-app:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: pantrypulse-alertwhatif-app

  # Self-contained Prometheus so the plugin is testable with no external
  # data source or token — scrapes itself, giving the provisioned sample
  # alert rule (provisioning/alerting/) real time-varying data to replay.
  prometheus:
    image: prom/prometheus:latest
    container_name: 'alertwhatif-prometheus'
    ports:
      - 9090:9090/tcp
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  grafana-data:
