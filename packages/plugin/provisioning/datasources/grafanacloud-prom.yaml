# Optional: only useful if you supply GC_PROM_URL + GC_PROM_TOKEN in .env
# (see ../.env.example). Reviewers can ignore it — the default Prometheus
# datasource (prometheus.yaml) is self-contained and needs no token.
apiVersion: 1

datasources:
  - name: grafanacloud-prom
    uid: grafanacloud-prom
    type: prometheus
    access: proxy
    url: $GC_PROM_URL
    isDefault: false
    editable: true
    jsonData:
      httpMethod: POST
      httpHeaderName1: Authorization
      timeInterval: 15s
    secureJsonData:
      httpHeaderValue1: Bearer $GC_PROM_TOKEN
