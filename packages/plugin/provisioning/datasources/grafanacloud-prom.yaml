apiVersion: 1

datasources:
  - name: grafanacloud-prom
    uid: grafanacloud-prom
    type: prometheus
    access: proxy
    url: $GC_PROM_URL
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      httpHeaderName1: Authorization
      timeInterval: 15s
    secureJsonData:
      httpHeaderValue1: Bearer $GC_PROM_TOKEN
